<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificaciones - {{ curso.codigo }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/docente.css') }}">
</head>
<body class="courses-page">
    <div class="dashboard-header">
        <div class="dashboard-title">
            <i class="fas fa-chalkboard-user"></i> Panel de Docente
        </div>
        <div class="user-info">
            <span>Hola, <strong>{{ usuario.nombre }}</strong></span>
            <a href="{{ url_for('dashboard.curso_docente_detalle', curso_id=curso.id) }}"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </div>

    <div class="courses-wrapper">
        <div class="course-header">
            <div>
                <h2>{{ curso.codigo }} / {{ curso.nombre }}</h2>
                <p>Calificaciones del curso</p>
            </div>
        </div>

        <div class="course-tabs">
            <a class="course-tab is-active">Calificaciones</a>
        </div>

        <div class="course-content">
            <p>Aquí podrás ver y editar las calificaciones de los estudiantes. (Funcionalidad pendiente de implementación detallada).</p>
            <!-- Placeholder: mostrar tabla de estudiantes y notas -->
        </div>
    </div>
</body>
</html>
