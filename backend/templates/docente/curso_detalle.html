<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Curso - Docente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/docente.css') }}">
</head>
<body class="courses-page">
    <div class="dashboard-header">
        <div class="dashboard-title">
            <i class="fas fa-chalkboard-user"></i> Panel de Docente
        </div>
        <div class="user-info">
            <span>Hola, <strong>{{ usuario.nombre }}</strong></span>
            <a href="{{ url_for('dashboard.cursos_docente') }}"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </div>

    <div class="courses-wrapper">
        <div class="course-header">
            <div>
                <h2>{{ curso.codigo }} / {{ curso.nombre }}</h2>
                <p>Gestion del curso</p>
            </div>
        </div>

        <div class="course-actions-grid">
            <a class="course-action-card" href="{{ url_for('dashboard.curso_docente_estudiantes', curso_id=curso.id) }}">
                <i class="fas fa-users"></i>
                <h3>Listado de estudiantes</h3>
                <p>Ver estudiantes inscritos en este curso</p>
            </a>
            <a class="course-action-card" href="{{ url_for('dashboard.curso_docente_calificaciones', curso_id=curso.id) }}">
                <i class="fas fa-pen-to-square"></i>
                <h3>Calificaciones</h3>
                <p>Registrar y revisar notas del curso</p>
            </a>
            <a class="course-action-card" href="{{ url_for('dashboard.curso_docente_asistencia', curso_id=curso.id) }}">
                <i class="fas fa-clipboard-check"></i>
                <h3>Asistencia</h3>
                <p>Control de asistencia por clase</p>
            </a>
        </div>
    </div>
</body>
</html>
