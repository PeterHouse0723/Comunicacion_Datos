<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cursos - Estudiante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estudiante.css') }}">
</head>
<body class="courses-page">
    <div class="dashboard-header">
        <div class="dashboard-title">
            <i class="fas fa-book"></i> Panel de Estudiante
        </div>
        <div class="user-info">
            <span>Hola, <strong>{{ usuario.nombre }}</strong></span>
            <a href="{{ url_for('dashboard.dashboard_estudiante') }}"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </div>

    <div class="courses-wrapper">
        <div class="course-header">
            <div>
                <h2>Mis Cursos</h2>
                <p>Cursos en los que estoy inscrito</p>
            </div>
        </div>

        <div class="course-content">
            {% if cursos %}
                <div class="courses-grid">
                    {% for curso in cursos %}
                        <a href="{{ url_for('dashboard.curso_estudiante_detalle', curso_id=curso.id) }}" class="course-card-link">
                            <div class="course-card">
                                <div class="course-banner course-banner--{{ ['purple', 'violet', 'teal'][loop.index0 % 3] }}">
                                    <div class="course-badge">{{ loop.index0 + 1 }}</div>
                                </div>
                                <div class="course-body">
                                    <div class="course-title">{{ curso.codigo }}</div>
                                    <div class="course-meta">
                                        <span>{{ curso.nombre }}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    {% endfor %}
                </div>
            {% else %}
                <div class="course-empty">
                    <i class="fas fa-inbox" style="font-size: 48px; color: #ccc; margin-bottom: 16px;"></i>
                    <p>No tienes cursos inscritos en este momento.</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
