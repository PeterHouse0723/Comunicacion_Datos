<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Asistencia Académica</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <h1>Welcome</h1>
        
        <div class="error-message" id="errorMsg"></div>
        
        <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Email"
                    required
                >
            </div>
            
            <div class="form-group">
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Password"
                    required
                >
            </div>
            
            <button type="submit" class="btn-login">LOGIN</button>
        </form>
        
        <div class="form-links">
            <a href="#">Forgot Password ?</a>
            <a href="{{ url_for('auth.register') }}">Sign Up</a>
        </div>

        <div class="divider"></div>

        <div class="social-login">
            <p>OR LOGIN WITH</p>
            <div class="social-icons">
                <a href="#" class="icon google"><i class="fab fa-google"></i></a>
                <a href="#" class="icon facebook"><i class="fab fa-facebook-f"></i></a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.remove('show');
        });
    </script>
</body>
</html>
