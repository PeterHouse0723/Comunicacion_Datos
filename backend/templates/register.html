<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema Académico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Toast notifications */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 18px 25px;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            display: none;
            animation: slideIn 0.4s ease-out;
        }
        
        .toast-notification.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toast-notification.error {
            background: rgba(231, 76, 60, 0.9);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
        
        .toast-notification.hide {
            animation: slideOut 0.4s ease-out forwards;
        }

        /* Texto negro en todo el formulario */
        body,
        .register-container,
        .register-container h1,
        .register-container p,
        .form-group label,
        .help-text,
        .requirement-title,
        .login-link,
        .login-link a,
        .form-group input,
        .form-group select,
        .requirement {
            color: black;
        }

        .form-group input::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }

        .requirement.valid {
            color: #2ecc71;
        }

        .requirement.invalid {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <!-- Notificación Flotante -->
    <div class="toast-notification" id="toast"></div>
    
    <div class="login-container register-container">
        <h1>Crear Cuenta</h1>
        <p>Completa el formulario para registrarte</p>
        
        <form id="registerForm">
            <!-- Nombre y Apellido -->
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Tu nombre"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido *</label>
                    <input 
                        type="text" 
                        id="apellido" 
                        name="apellido" 
                        placeholder="Tu apellido"
                        required
                    >
                </div>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label for="email">Correo Electrónico *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="ejemplo@universidad.edu"
                    required
                >
            </div>
            
            <!-- Rol -->
            <div class="form-group">
                <label for="rol">Tipo de Usuario *</label>
                <select id="rol" name="rol" required>
                    <option value="">-- Selecciona tu rol --</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Docente</option>
                </select>
            </div>

            <!-- Institución -->
            <div class="form-group">
                <label for="institucion_id">Institución *</label>
                <select id="institucion_id" name="institucion_id" required>
                    <option value="">-- Selecciona tu institución --</option>
                    {% for inst in instituciones %}
                    <option value="{{ inst.id }}">{{ inst.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <!-- Contraseña -->
            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Mínimo 8 caracteres"
                    required
                >
                
                <!-- Requisitos -->
                <div class="password-requirements">
                    <p class="requirement-title">La contraseña debe contener:</p>
                    <ul>
                        <li class="requirement" id="req-length">✓ Mínimo 8 caracteres</li>
                        <li class="requirement" id="req-uppercase">✓ Al menos 1 mayúscula (A-Z)</li>
                        <li class="requirement" id="req-number">✓ Al menos 1 número (0-9)</li>
                        <li class="requirement" id="req-special">✓ Al menos 1 carácter especial (!@#$%^&*)</li>
                    </ul>
                </div>
            </div>
            
            <!-- Confirmar Contraseña -->
            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña *</label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    placeholder="Repite tu contraseña"
                    required
                >
            </div>
            
            <!-- Botón -->
            <button type="submit" class="btn-login">CREAR CUENTA</button>
        </form>
        
        <!-- Enlace a login -->
        <div class="form-links">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm_password');
        const toast = document.getElementById('toast');

        // Validar contraseña en tiempo real
        passwordInput.addEventListener('input', validatePassword);
        confirmInput.addEventListener('input', validatePassword);

        function validatePassword() {
            const pwd = passwordInput.value;

            const hasLength = pwd.length >= 8;
            const hasUppercase = /[A-Z]/.test(pwd);
            const hasNumber = /[0-9]/.test(pwd);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(pwd);

            updateRequirement('req-length', hasLength);
            updateRequirement('req-uppercase', hasUppercase);
            updateRequirement('req-number', hasNumber);
            updateRequirement('req-special', hasSpecial);
        }

        function updateRequirement(id, isValid) {
            const element = document.getElementById(id);
            if (isValid) {
                element.classList.add('valid');
                element.classList.remove('invalid');
            } else {
                element.classList.add('invalid');
                element.classList.remove('valid');
            }
        }

        function showToast(message, isSuccess = true) {
            toast.textContent = '';
            toast.className = 'toast-notification';
            
            const icon = document.createElement('i');
            icon.className = isSuccess ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            
            const text = document.createElement('span');
            text.textContent = message;
            
            toast.appendChild(icon);
            toast.appendChild(text);
            
            if (!isSuccess) {
                toast.classList.add('error');
            }
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }, 3500);
        }

        // Enviar formulario con AJAX
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const pwd = passwordInput.value;
            const confirm = confirmInput.value;

            // Validación básica
            if (pwd !== confirm) {
                showToast('Las contraseñas no coinciden', false);
                return;
            }

            try {
                const response = await fetch('{{ url_for("auth.register") }}', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('¡Registro exitoso! Redirigiendo al login...');
                    
                    setTimeout(() => {
                        window.location.href = '{{ url_for("auth.login") }}';
                    }, 2000);
                } else {
                    showToast(data.error || 'Error al registrarse', false);
                }
            } catch (error) {
                showToast('Error de conexión', false);
            }
        });

        // Validar al cargar la página
        validatePassword();
    </script>
</body>
</html>
