<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema Académico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Notificación Flotante -->
    <div class="toast-notification" id="toast"></div>

    <div class="register-container">
        <!-- Encabezado -->
        <div class="form-header">
            <div class="header-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Crear Cuenta</h1>
            <p>Completa el formulario para registrarte</p>
        </div>

        <form id="registerForm">
            <!-- Nombre y Apellido -->
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">
                        <i class="fas fa-user"></i> Nombre *
                    </label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Tu nombre"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="apellido">
                        <i class="fas fa-user"></i> Apellido *
                    </label>
                    <input
                        type="text"
                        id="apellido"
                        name="apellido"
                        placeholder="Tu apellido"
                        required
                    >
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Correo Electrónico *
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="ejemplo@universidad.edu"
                    required
                >
            </div>

            <!-- Rol -->
            <div class="form-group">
                <label for="rol">
                    <i class="fas fa-id-badge"></i> Tipo de Usuario *
                </label>
                <select id="rol" name="rol" required>
                    <option value="">-- Selecciona tu rol --</option>
                    <option value="docente">Docente</option>
                    <option value="admin_local">Decano / Director</option>
                </select>
            </div>

            <!-- Institución -->
            <div class="form-group">
                <label for="institucion_id">
                    <i class="fas fa-university"></i> Institución *
                </label>
                <select id="institucion_id" name="institucion_id" required>
                    <option value="">-- Selecciona tu institución --</option>
                    {% for inst in instituciones %}
                    <option value="{{ inst.id }}">{{ inst.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Contraseña -->
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Contraseña *
                </label>
                <div class="password-input-container">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Mínimo 8 caracteres"
                        required
                    >
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <!-- Barra de fortaleza -->
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span id="strengthText"></span>
                </div>

                <!-- Requisitos -->
                <div class="password-requirements">
                    <p class="requirement-title">La contraseña debe contener:</p>
                    <ul>
                        <li class="requirement" id="req-length">
                            <i class="fas fa-circle"></i> Mínimo 8 caracteres
                        </li>
                        <li class="requirement" id="req-uppercase">
                            <i class="fas fa-circle"></i> Al menos 1 mayúscula (A-Z)
                        </li>
                        <li class="requirement" id="req-number">
                            <i class="fas fa-circle"></i> Al menos 1 número (0-9)
                        </li>
                        <li class="requirement" id="req-special">
                            <i class="fas fa-circle"></i> Al menos 1 carácter especial (!@#$%^&*)
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Confirmar Contraseña -->
            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-lock"></i> Confirmar Contraseña *
                </label>
                <div class="password-input-container">
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Repite tu contraseña"
                        required
                    >
                    <button type="button" class="toggle-password" id="toggleConfirm">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="match-message" id="matchMessage"></span>
            </div>

            <!-- Botón de Registro -->
            <div class="form-actions">
                <button type="submit" class="btn-register" id="btnRegister">
                    <span class="btn-text">
                        <i class="fas fa-user-plus"></i> CREAR CUENTA
                    </span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> Registrando...
                    </span>
                </button>

                <!-- Enlace a login -->
                <div class="login-link">
                    ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a>
                </div>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm_password');
        const toast = document.getElementById('toast');
        const btnRegister = document.getElementById('btnRegister');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const matchMessage = document.getElementById('matchMessage');

        // Toggle visibilidad contraseña
        document.getElementById('togglePassword').addEventListener('click', function () {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        document.getElementById('toggleConfirm').addEventListener('click', function () {
            const type = confirmInput.type === 'password' ? 'text' : 'password';
            confirmInput.type = type;
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Validar contraseña en tiempo real
        passwordInput.addEventListener('input', validatePassword);
        confirmInput.addEventListener('input', checkMatch);

        function validatePassword() {
            const pwd = passwordInput.value;

            const hasLength = pwd.length >= 8;
            const hasUppercase = /[A-Z]/.test(pwd);
            const hasNumber = /[0-9]/.test(pwd);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(pwd);

            updateRequirement('req-length', hasLength);
            updateRequirement('req-uppercase', hasUppercase);
            updateRequirement('req-number', hasNumber);
            updateRequirement('req-special', hasSpecial);

            // Barra de fortaleza
            let score = 0;
            if (hasLength) score++;
            if (hasUppercase) score++;
            if (hasNumber) score++;
            if (hasSpecial) score++;

            const levels = [
                { width: '0%', color: 'transparent', text: '' },
                { width: '25%', color: '#e74c3c', text: 'Débil' },
                { width: '50%', color: '#f39c12', text: 'Regular' },
                { width: '75%', color: '#3498db', text: 'Buena' },
                { width: '100%', color: '#27ae60', text: 'Fuerte' }
            ];

            if (pwd.length === 0) score = 0;

            strengthFill.style.width = levels[score].width;
            strengthFill.style.backgroundColor = levels[score].color;
            strengthText.textContent = levels[score].text;
            strengthText.style.color = levels[score].color;

            checkMatch();
        }

        function checkMatch() {
            const pwd = passwordInput.value;
            const confirm = confirmInput.value;

            if (confirm.length === 0) {
                matchMessage.textContent = '';
                matchMessage.className = 'match-message';
                return;
            }

            if (pwd === confirm) {
                matchMessage.textContent = '✓ Las contraseñas coinciden';
                matchMessage.className = 'match-message match-valid';
            } else {
                matchMessage.textContent = '✗ Las contraseñas no coinciden';
                matchMessage.className = 'match-message match-invalid';
            }
        }

        function updateRequirement(id, isValid) {
            const element = document.getElementById(id);
            const icon = element.querySelector('i');

            if (isValid) {
                element.classList.add('valid');
                element.classList.remove('invalid');
                icon.className = 'fas fa-check-circle';
            } else {
                element.classList.add('invalid');
                element.classList.remove('valid');
                icon.className = 'fas fa-circle';
            }
        }

        function showToast(message, isSuccess = true) {
            toast.textContent = '';
            toast.className = 'toast-notification';

            const icon = document.createElement('i');
            icon.className = isSuccess ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';

            const text = document.createElement('span');
            text.textContent = message;

            toast.appendChild(icon);
            toast.appendChild(text);

            if (!isSuccess) {
                toast.classList.add('error');
            }

            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }, 3500);
        }

        // Enviar formulario con AJAX
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const pwd = passwordInput.value;
            const confirm = confirmInput.value;

            if (pwd.length < 8) {
                showToast('La contraseña debe tener al menos 8 caracteres', false);
                passwordInput.focus();
                return;
            }

            if (!/[A-Z]/.test(pwd)) {
                showToast('La contraseña debe tener al menos 1 mayúscula', false);
                passwordInput.focus();
                return;
            }

            if (!/[0-9]/.test(pwd)) {
                showToast('La contraseña debe tener al menos 1 número', false);
                passwordInput.focus();
                return;
            }

            if (!/[!@#$%^&*(),.?":{}|<>]/.test(pwd)) {
                showToast('La contraseña debe tener al menos 1 carácter especial', false);
                passwordInput.focus();
                return;
            }

            if (pwd !== confirm) {
                showToast('Las contraseñas no coinciden', false);
                confirmInput.focus();
                return;
            }

            const btnText = btnRegister.querySelector('.btn-text');
            const btnLoader = btnRegister.querySelector('.btn-loader');
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            btnRegister.disabled = true;
            btnRegister.classList.add('loading');

            try {
                const response = await fetch('{{ url_for("auth.register") }}', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('¡Registro exitoso! Redirigiendo al login...');
                    setTimeout(() => {
                        window.location.href = '{{ url_for("auth.login") }}';
                    }, 2000);
                } else {
                    showToast(data.error || 'Error al registrarse', false);
                }
            } catch (error) {
                showToast('Error de conexión', false);
            } finally {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                btnRegister.disabled = false;
                btnRegister.classList.remove('loading');
            }
        });

        validatePassword();
    </script>
</body>
</html>
